name: golangci-lint
on:
  push:
    branches:
      - main
      - test
  pull_request:
    types: [opened, synchronize]

permissions:
  # Required: allow read access to the content for analysis.
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  pull-requests: read
  # Optional: allow write access to checks to allow the action to annotate code in the PR.
  checks: write

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Pin to the module's Go version.  With go-version: stable the
          # toolchain drifts ahead of the pinned golangci-lint binary and
          # panics: "file requires newer Go version" (e.g. go1.26 stdlib
          # against golangci-lint v2.1.6 built with go1.24).
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
